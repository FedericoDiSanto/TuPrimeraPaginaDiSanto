{% extends 'mundial/base.html' %}

{% block title %} Editar Perfil {% endblock %}

{% block content %}
<h1> Editar Perfil </h1>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
<div class="mb-3">
    <label>Nombre:</label>
    <input class="form-control" type="text" name="first_name" value="{{ request.user.first_name }}">
</div>

<div class="mb-3">
    <label>Apellido:</label>
    <input class="form-control" type="text" name="last_name" value="{{ request.user.last_name }}">
</div>

<div class="mb-3">
    <label>Fecha nacimiento:</label>
    {{ form.fecha_nacimiento }}
</div>

<div class="mb-3">
    <label>DNI:</label>
    {{ form.dni }}
</div>

<div class="mb-3">
    <label>Biografía:</label>
    {{ form.biografia }}
</div>

<div class="mb-3">
    <label>Avatar:</label>
    {{ form.avatar }}
</div>

    <button type="submit" class="btn btn-primary"> Guardar cambios </button>
</form>
<a href="{% url 'cuentas:perfil' %}" class="btn btn-secondary mt-3"> Volver al perfil </a>
{% endblock %}
