{% extends 'mundial/base.html' %}

{% block title %} Crear Perfil {% endblock %}

{% block content %}
<h1> Crear Perfil </h1>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Nombre:</label>
    <input type="text" name="first_name" class="form-control">

    <label>Apellido:</label>
    <input type="text" name="last_name" class="form-control">

    <div class="mb-3">
        <label>Fecha de nacimiento:</label>
        {{ form.fecha_nacimiento }}
    </div>

    <div class="mb-3">
        <label>DNI:</label>
        {{ form.dni }}
    </div>

    <div class="mb-3">
        <label>Biografía:</label>
        {{ form.biografia }}
    </div>

    <div class="mb-3">
        <label>Avatar:</label>
        {{ form.avatar }}
    </div>

    <button type="submit" class="btn btn-primary">
        Guardar
    </button>
</form>
<a href="{% url 'mundial:home' %}" class="btn btn-secondary mt-3"> Volver al inicio </a>
{% endblock %}
